version: '3.8'

services:
  apigateway:
    image: apigateway
    build:
      context: .
      dockerfile: ApiGateway/Dockerfile
    ports:
      - "5067:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - auth.api
      - measurement.api

  auth.api:
    image: authapi
    build:
      context: .
      dockerfile: Auth.API/Dockerfile
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # Optional: Override DB connection to use host's SQL Express or a Docker SQL Server (uncomment if needed)
      # - ConnectionStrings__DefaultConnection=Server=host.docker.internal\SQLEXPRESS;Database=QuantityMeasurementSystem;User Id=YourUser;Password=YourPassword;TrustServerCertificate=True;

  measurement.api:
    image: measurementapi
    build:
      context: .
      dockerfile: Measurement.API/Dockerfile
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # Optional: Override DB connection to use host's SQL Express or a Docker SQL Server (uncomment if needed)
      # - ConnectionStrings__DefaultConnection=Server=host.docker.internal\SQLEXPRESS;Database=QuantityMeasurementSystem;User Id=YourUser;Password=YourPassword;TrustServerCertificate=True;
